<!-- ═══════════════════════════════════════════════════════
     SERPEX — PATCH PWA à coller dans <head> de index.html
     (après les balises favicon existantes)
     ═══════════════════════════════════════════════════════ -->

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- iOS / Safari PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SERPEX">
<link rel="apple-touch-icon" href="favicon.png">

<!-- Couleur de thème (déjà présent, vérifier qu'il est bien là) -->
<meta name="theme-color" content="#0a0a1a">


<!-- ═══════════════════════════════════════════════════════
     À coller juste avant </body> dans index.html
     ═══════════════════════════════════════════════════════ -->
<script>
  // Enregistrement du Service Worker PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/serpex/sw.js')
        .then(reg => console.log('[SERPEX PWA] Service Worker enregistré :', reg.scope))
        .catch(err => console.warn('[SERPEX PWA] Échec SW :', err));
    });
  }

  // Bouton d'installation PWA (optionnel — affiche une bannière custom)
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    // Affiche un bouton ou bannière d'install si tu en as un dans le menu
    const installBtn = document.getElementById('pwaInstallBtn');
    if (installBtn) installBtn.style.display = 'block';
  });

  // Appelle cette fonction quand l'utilisateur clique sur ton bouton d'install
  window.installPWA = function() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
      if (choice.outcome === 'accepted') {
        console.log('[SERPEX PWA] Installée !');
      }
      deferredPrompt = null;
      const installBtn = document.getElementById('pwaInstallBtn');
      if (installBtn) installBtn.style.display = 'none';
    });
  };

  // Masque le bouton si déjà installée
  window.addEventListener('appinstalled', () => {
    const installBtn = document.getElementById('pwaInstallBtn');
    if (installBtn) installBtn.style.display = 'none';
    deferredPrompt = null;
  });
</script>
